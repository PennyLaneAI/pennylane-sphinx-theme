version: 2

sphinx:
  configuration: doc/conf.py

python:
  install:
    - requirements: doc/requirements.txt
    - method: pip
      path: .
    # Reinstall setuptools after main deps (pip may remove it when downgrading sphinx).
    - requirements: doc/requirements-setuptools.txt

build:
  os: ubuntu-22.04
  tools:
    python: "3.9"
  apt_packages:
    - graphviz
